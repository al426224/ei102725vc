<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Asistente PAP/PATI - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body>

<main class="container py-5">
    <div class="profile-card info-max-width mx-auto">
        <div class="profile-details">
            <h1 class="page-title">Detalle del Asistente</h1>

            <div class="info-group">
                <span class="info-label">Nombre Completo</span>
                <span class="info-value" th:text="${asistente.nombre}">Nombre</span>
            </div>

            <div class="info-group">
                <span class="info-label">Email</span>
                <span class="info-value" th:text="${asistente.email}">Email</span>
            </div>

            <div class="info-group">
                <span class="info-label">Tipo de Asistente</span>
                <span class="info-value" th:text="${asistente.tipoAsistente}">Tipo</span>
            </div>

            <div class="info-group">
                <span class="info-label">Disponibilidad</span>
                <span class="info-value" th:text="${asistente.disponibilidad}">Disponibilidad</span>
            </div>

            <div class="info-group">
                <span class="info-label">Municipio</span>
                <span class="info-value" th:text="${asistente.municipio} ?: '-'">Municipio</span>
            </div>

            <div class="info-group">
                <span class="info-label">Formacion Previa</span>
                <p class="info-value info-texto-libre" th:text="${asistente.formacionPrevia}">
                    Formacion...
                </p>
            </div>
        </div>

        <div class="profile-actions">
            <div class="avatar-placeholder" th:text="${asistente.nombre.substring(0,1)}">A</div>
            <p class="perfil-rol">Asistente PAP/PATI</p>

            <div th:if="${asistente.estadoValidacion == 'pendiente'}" class="mb-2">
                <label for="aprobarAsistenteToggle" class="btn btn-primary btn-full">Aprobar Asistente</label>
            </div>

            <form th:if="${asistente.estadoValidacion == 'pendiente'}" th:action="@{/tecnico/asistente/reject/{id}(id=${asistente.idAsistente})}" method="post" class="form-inline mb-2">
                <button type="submit" class="btn btn-outline btn-full">Rechazar Asistente</button>
            </form>

            <form th:action="@{/tecnico/asistentes}" method="get" class="form-inline">
                <button type="submit" class="btn btn-outline btn-full">Volver a la lista</button>
            </form>

            <a th:if="${volverACandidatos != null}" th:href="@{/tecnico/peticion/{id}/candidatos(id=${volverACandidatos})}" class="btn btn-outline btn-full" style="margin-top: 0.5rem;">
                Volver a candidatos
            </a>
        </div>
    </div>
</main>

<input th:if="${asistente.estadoValidacion == 'pendiente'}" type="checkbox" id="aprobarAsistenteToggle" class="notice-toggle">
<div th:if="${asistente.estadoValidacion == 'pendiente'}" class="window-notice">
    <div class="content">
        <div class="content-text">¿Estas seguro de que quieres aprobar este asistente?<br>Este cambio no se puede deshacer.</div>
        <div class="content-buttons">
            <label for="aprobarAsistenteToggle" class="btn btn-outline">Volver</label>
            <form th:action="@{/tecnico/asistente/approve/{id}(id=${asistente.idAsistente})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-primary">Si, aprobar</button>
            </form>
        </div>
    </div>
</div>
</body>

</html>
