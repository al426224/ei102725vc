<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - SgOVI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/usuarioOVI/homeUsuarioOVI}" class="nav-item active">Dashboard</a>
        <a th:href="@{/peticionAP/mis-solicitudes}" class="nav-item">Mis Solicitudes</a>
        <a th:href="@{/peticionAP/nueva}" class="nav-item">Nueva Solicitud</a>
        <a th:href="@{/usuarioOVI/perfil/{id}(id=${usuario.idUsuario})}" class="nav-item">Mi Perfil</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <span class="profile-badge" th:text="${usuario.estado}">pendiente</span>
        </div>
        <div style="font-weight: 500;">
            Usuario: <span th:text="${usuario.nombre}">Nombre</span>
        </div>
    </header>

    <section class="welcome-card">
        <h1>¡Hola de nuevo, <span th:text="${usuario.nombre}">Usuario</span>!</h1>
        <p>Bienvenido a tu oficina virtual de vida independiente. ¿Qué necesitas gestionar hoy?</p>
    </section>

    <section class="stats-grid">
        <div class="stat-card">
            <h3>Solicitudes Activas</h3>
            <p>2</p>
        </div>
        <div class="stat-card">
            <h3>Asistentes Asignados</h3>
            <p>1</p>
        </div>
        <div class="stat-card">
            <h3>Próxima Cita</h3>
            <p>12 May</p>
        </div>
    </section>
</main>

</body>
</html>
