<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/asistentePersonal/home}" class="nav-item">Dashboard</a>
        <a th:href="@{/asistentePersonal/perfil/{id}(id=${asistente.idAsistente})}" class="nav-item active">Mi Perfil</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <span class="profile-badge" th:classappend="${asistente.estadoValidacion}" th:text="${asistente.estadoValidacion}">aceptado</span>
        </div>
    </header>

    <h1 class="page-title">Editar Perfil</h1>

    <div class="form-card">
        <form th:action="@{/asistentePersonal/update}" method="post" th:object="${asistente}">
            <input type="hidden" th:field="*{idAsistente}">
            <input type="hidden" th:field="*{email}">
            <input type="hidden" th:field="*{contrasena}">
            <input type="hidden" th:field="*{tipoAsistente}">
            <input type="hidden" th:field="*{estadoValidacion}">

            <div class="info-group">
                <span class="info-label">Nombre Completo</span>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Tu nombre completo" required>
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="info-group">
                <span class="info-label">Email de Contacto</span>
                <span class="info-value" th:text="${asistente.email}">email@ejemplo.com</span>
            </div>

            <div class="info-group">
                <span class="info-label">Tipo de Asistente</span>
                <span class="info-value" th:text="${asistente.tipoAsistente}">PAP</span>
            </div>

            <div class="info-group">
                <span class="info-label">Disponibilidad</span>
                <textarea th:field="*{disponibilidad}" class="form-control" rows="3" placeholder="Describe tu disponibilidad horaria..."></textarea>
                <div class="error" th:if="${#fields.hasErrors('disponibilidad')}" th:errors="*{disponibilidad}"></div>
            </div>

            <div class="info-group">
                <span class="info-label">Formación Previa</span>
                <textarea th:field="*{formacionPrevia}" class="form-control" rows="4" placeholder="Describe tu formación y experiencia..."></textarea>
                <div class="error" th:if="${#fields.hasErrors('formacionPrevia')}" th:errors="*{formacionPrevia}"></div>
            </div>

            <div class="info-group">
                <span class="info-label">Municipio</span>
                <input type="text" th:field="*{municipio}" class="form-control" placeholder="Tu municipio">
                <div class="error" th:if="${#fields.hasErrors('municipio')}" th:errors="*{municipio}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a th:href="@{/asistentePersonal/perfil/{id}(id=${asistente.idAsistente})}" class="btn btn-outline">Cancelar</a>
            </div>
        </form>
    </div>

    <footer>
        <p>© 2026 SgOVI - Oficina per la Vida Independent de Castelló</p>
    </footer>
</main>

</body>
</html>
