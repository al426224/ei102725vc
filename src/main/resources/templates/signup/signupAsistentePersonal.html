<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
    <title>Registro PAP/PATI - SgOVI</title>
</head>
<body>
<header class="header">
    <div class="nombre">
        <a th:href="@{/}" class="a">
            <span class="nav-logo-icon">OVI</span>
            <span class="nav-logo-text">SgOVI</span>
        </a>
    </div>
</header>

<div class="main-content">
    <div class="lado-izquierdo">
        <h1 class="titulo-pagina">Registro<br>PAP / PATI</h1>
    </div>

    <div class="lado-derecho">
        <form th:action="@{/signup/registerAsistentePersonal}" method="POST" class="formulario" th:object="${asistente}">

            <p class="campos-obligatorios"><abbr title="campo obligatorio">*</abbr> Campos obligatorios</p>

            <div class="campos">
                <label for="nombre">Nombre completo <abbr title="campo obligatorio">*</abbr></label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Tu nombre completo">
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="campos">
                <label for="email">Email <abbr title="campo obligatorio">*</abbr></label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="tu@email.com">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="campos-fila">
                <div class="campos">
                    <label for="contrasena">Contraseña <abbr title="campo obligatorio">*</abbr></label>
                    <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="Mínimo 8 caracteres">
                    <div class="error" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
                </div>
                <div class="campos">
                    <label for="tipoAsistente">Tipo de Perfil <abbr title="campo obligatorio">*</abbr></label>
                    <select id="tipoAsistente" th:field="*{tipoAsistente}" class="form-control">
                        <option value="PAP">PAP (Asistente Personal)</option>
                        <option value="PATI">PATI (Infantil)</option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('tipoAsistente')}" th:errors="*{tipoAsistente}"></div>
                </div>
            </div>

            <div class="campos">
                <label for="disponibilidad">Disponibilidad Horaria <abbr title="campo obligatorio">*</abbr></label>
                <input type="text" id="disponibilidad" th:field="*{disponibilidad}" class="form-control" placeholder="Ej. Mañanas, Fines de semana...">
                <div class="error" th:if="${#fields.hasErrors('disponibilidad')}" th:errors="*{disponibilidad}"></div>
            </div>

            <div class="campos">
                <label for="formacionPrevia">Formación y Experiencia <abbr title="campo obligatorio">*</abbr></label>
                <textarea id="formacionPrevia" th:field="*{formacionPrevia}" class="form-control" rows="3" placeholder="Describe brevemente tu formación y experiencia..."></textarea>
                <div class="error" th:if="${#fields.hasErrors('formacionPrevia')}" th:errors="*{formacionPrevia}"></div>
            </div>

            <div class="enviar">
                <button type="submit" class="btn btn-primary" style="display: block;">Finalizar Registro</button>
                <a th:href="@{/signup}" class="back-link">Volver atras</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
