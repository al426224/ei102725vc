<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <title>Registro PAP/PATI - SgOVI</title>
</head>
<body>
<header>
    <div class="logo">
        <img th:src="@{/images/logo.png}" alt="Logo">
    </div>
</header>

<div class="main-content">
    <div class="lado-izquierdo">
        <h1 class="titulo-pagina">Registro<br>PAP / PATI</h1>
    </div>

    <div class="lado-derecho">
        <form th:action="@{/signup/registerAsistentePersonal}" method="POST" class="formulario" th:object="${asistente}">

            <p class="campos-obligatorios">* Campos obligatorios</p>

            <div class="campos">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Tu nombre completo">
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="campos">
                <label for="email">Email *</label>
                <input type="email" id="email" th:field="*{email}" placeholder="tu@email.com">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="campos-fila">
                <div class="campos">
                    <label for="contrasena">Contraseña *</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Mínimo 8 caracteres">
                    <div class="error" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
                </div>
                <div class="campos">
                    <label for="tipoAsistente">Tipo de Perfil *</label>
                    <select id="tipoAsistente" th:field="*{tipoAsistente}">
                        <option value="PAP">PAP (Asistente Personal)</option>
                        <option value="PATI">PATI (Infantil)</option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('tipoAsistente')}" th:errors="*{tipoAsistente}"></div>
                </div>
            </div>

            <div class="campos">
                <label for="disponibilidad">Disponibilidad Horaria *</label>
                <input type="text" id="disponibilidad" th:field="*{disponibilidad}" placeholder="Ej. Mañanas, Fines de semana...">
                <div class="error" th:if="${#fields.hasErrors('disponibilidad')}" th:errors="*{disponibilidad}"></div>
            </div>

            <div class="campos">
                <label for="formacionPrevia">Formación y Experiencia *</label>
                <textarea id="formacionPrevia" th:field="*{formacionPrevia}" rows="3" placeholder="Describe brevemente tu formación y experiencia..."></textarea>
                <div class="error" th:if="${#fields.hasErrors('formacionPrevia')}" th:errors="*{formacionPrevia}"></div>
            </div>

            <div class="enviar">
                <button type="submit" class="boton">Finalizar Registro</button>
                <a th:href="@{/signup}" class="boton-secundario">Volver atrás</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
