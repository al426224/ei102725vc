<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <title>Registro Usuario OVI - SgOVI</title>
</head>
<body>
<header>
    <div class="logo">
        <img th:src="@{/images/logo.png}" alt="Logo de SgOVI">
    </div>
</header>

<div class="main-content">
    <div class="lado-izquierdo">
        <h1 class="titulo-pagina">Registro<br>Usuario OVI</h1>
    </div>

    <div class="lado-derecho">
        <form th:action="@{/signup/registerUsuarioOVI}" method="POST" class="formulario" th:object="${usuarioOVI}">

            <p class="campos-obligatorios"><abbr title="campo obligatorio">*</abbr> Campos obligatorios</p>

            <div class="campos">
                <label for="nombre">Nombre completo <abbr title="campo obligatorio">*</abbr></label>
                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Tu nombre completo">
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="campos-fila">
                <div class="campos">
                    <label for="email">Email <abbr title="campo obligatorio">*</abbr></label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="tu@email.com">
                    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="campos">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" th:field="*{telefono}" class="form-control" placeholder="600 000 000">
                </div>
            </div>

            <div class="campos-fila">
                <div class="campos">
                    <label for="dni">DNI <abbr title="campo obligatorio">*</abbr></label>
                    <input type="text" id="dni" th:field="*{dni}" class="form-control" placeholder="12345678A">
                    <div class="error" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                </div>
                <div class="campos">
                    <label for="fechaNacimiento">Fecha de Nacimiento <abbr title="campo obligatorio">*</abbr></label>
                    <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" class="form-control">
                    <div class="error" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></div>
                </div>
            </div>

            <div class="campos">
                <label for="contrasena">Contraseña <abbr title="campo obligatorio">*</abbr></label>
                <input type="password" id="contrasena" name="contrasena" th:value="${rawPassword}" class="form-control" placeholder="Mínimo 8 caracteres">
                <div class="error" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
            </div>

            <div class="campos">
                <label for="proyectoVida">Proyecto de Vida</label>
                <textarea id="proyectoVida" th:field="*{proyectoVida}" class="form-control" rows="3" placeholder="Describe brevemente tus objetivos de vida independiente..."></textarea>
            </div>

            <div class="campos campos-checkbox">
                <input type="checkbox" id="consentimientoLOPD" th:field="*{consentimientoLOPD}" class="form-check-input">
                <label for="consentimientoLOPD" class="form-check-label">Acepto el tratamiento de datos personales y el registro del consentimiento (LOPD/RGPD).</label>
            </div>
            <div class="error" th:if="${#fields.hasErrors('consentimientoLOPD')}" th:errors="*{consentimientoLOPD}"></div>

            <div class="enviar">
                <button type="submit" class="boton btn btn-primary">Finalizar Registro</button>
                <a th:href="@{/signup}" class="boton-secundario">Volver atrás</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
