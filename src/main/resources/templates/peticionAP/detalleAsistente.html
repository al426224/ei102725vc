<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Asistente - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/usuarioOVI/homeUsuarioOVI}" class="nav-item">Dashboard</a>
        <a th:href="@{/peticionAP/mis-solicitudes}" class="nav-item active">Mis Solicitudes</a>
        <a th:href="@{/peticionAP/nueva}" class="nav-item">Nueva Solicitud</a>
        <a th:href="@{/usuarioOVI/perfil/{id}(id=${usuario.idUsuario})}" class="nav-item">Mi Perfil</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <h1 class="page-title">Detalle del Asistente</h1>

    <div class="detail-card">
        <div class="section-row">
            <span class="info-label">Nombre Completo</span>
            <span th:text="${asistente.nombre}">Nombre</span>
        </div>

        <div class="section-row">
            <span class="info-label">Email</span>
            <span th:text="${asistente.email}">email@ejemplo.com</span>
        </div>

        <div class="section-row">
            <span class="info-label">Tipo de Asistente</span>
            <span class="status-badge validado" th:text="${asistente.tipoAsistente}">PAP</span>
        </div>

<div class="section-row">
            <span class="info-label">Municipio</span>
            <span th:text="${asistente.municipio} ?: '-'"></span>
        </div>

        <div class="section-row">
            <span class="info-label">Disponibilidad</span>
            <span th:text="${asistente.disponibilidad} ?: '-'"></span>
        </div>

        <div class="info-group" th:if="${asistente.formacionPrevia}">
            <span class="info-label">Formación Previa</span>
            <p class="info-value info-texto-libre" th:text="${asistente.formacionPrevia}"></p>
        </div>

        <div class="form-actions">
            <a th:href="@{/peticionAP/candidatos/{id}(id=${peticion.idSolicitud})}" class="btn btn-outline">Volver a candidatos</a>
        </div>
    </div>
</main>

</body>
</html>
