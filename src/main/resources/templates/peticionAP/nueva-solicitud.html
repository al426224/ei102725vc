<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Solicitud AP - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
    <script>
        function autoResize(obj) {
            obj.style.height = 'auto';
            obj.style.height = obj.scrollHeight + 'px';
        }
    </script>
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/usuarioOVI/homeUsuarioOVI}" class="nav-item">Dashboard</a>
        <a th:href="@{/peticionAP/mis-solicitudes}" class="nav-item">Mis Solicitudes</a>
        <a th:href="@{/peticionAP/nueva}" class="nav-item active">Nueva Solicitud</a>
        <a th:href="@{/usuarioOVI/perfil/{id}(id=${usuario.idUsuario})}" class="nav-item">Mi Perfil</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <h1 class="page-title">Nueva Solicitud de Asistencia</h1>

    <div class="form-card">
        <form th:action="@{/peticionAP/nueva}" method="post" th:object="${peticionAP}">
            <p class="required-text"><abbr title="campo obligatorio">*</abbr> Campos obligatorios</p>

            <div class="form-row">
                <div class="form-group">
                    <label for="tipoAsistencia" class="form-label">Tipo de asistencia <abbr title="campo obligatorio">*</abbr></label>
                    <select id="tipoAsistencia" class="form-control" th:field="*{tipoAsistencia}" required>
                        <option value="">Selecciona tipo</option>
                        <option value="PAP">PAP (mayores de edad)</option>
                        <option value="PATI">PATI (menores de edad)</option>
                    </select>
                    <span th:if="${#fields.hasErrors('tipoAsistencia')}" th:errors="*{tipoAsistencia}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label for="horasSemanales" class="form-label">Horas semanales <abbr title="campo obligatorio">*</abbr></label>
                    <input type="number" id="horasSemanales" class="form-control" th:field="*{horasSemanales}" min="1" max="168" required>
                    <span th:if="${#fields.hasErrors('horasSemanales')}" th:errors="*{horasSemanales}" class="field-error"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tiempoPreferido" class="form-label">Tiempo preferido <abbr title="campo obligatorio">*</abbr></label>
                    <input type="text" id="tiempoPreferido" class="form-control" th:field="*{tiempoPreferido}" placeholder="Ej: Mananas de 9h a 13h" required>
                    <span th:if="${#fields.hasErrors('tiempoPreferido')}" th:errors="*{tiempoPreferido}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label for="tipoTareas" class="form-label">Tipo de tareas <abbr title="campo obligatorio">*</abbr></label>
                    <select id="tipoTareas" class="form-control" th:field="*{tipoTareas}" required>
                        <option value="">Selecciona tipo de tarea</option>
                        <option value="acompanyament educatiu">Acompanyamiento educativo</option>
                        <option value="acompanyament laboral">Acompanyamiento laboral</option>
                        <option value="cura personal">Cuidado personal</option>
                        <option value="mobilitat">Movilidad</option>
                        <option value="domicili">Asistencia en domicilio</option>
                        <option value="oci temps lliure">Ocio y tiempo libre</option>
                        <option value="altres">Otros</option>
                    </select>
                    <span th:if="${#fields.hasErrors('tipoTareas')}" th:errors="*{tipoTareas}" class="field-error"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="municipio" class="form-label">Municipio <abbr title="campo obligatorio">*</abbr></label>
                    <input type="text" id="municipio" class="form-control" th:field="*{municipio}" placeholder="Ej: Castello de la Plana" required>
                    <span th:if="${#fields.hasErrors('municipio')}" th:errors="*{municipio}" class="field-error"></span>
                </div>

                <div class="form-group">
                    <label for="fechaInicioPrevista" class="form-label">Fecha de inicio prevista <abbr title="campo obligatorio">*</abbr></label>
                    <input type="date" id="fechaInicioPrevista" class="form-control" th:field="*{fechaInicioPrevista}" required>
                    <span th:if="${#fields.hasErrors('fechaInicioPrevista')}" th:errors="*{fechaInicioPrevista}" class="field-error"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="descripcion" class="form-label">Descripcion de la necesidad</label>
                <textarea id="descripcion" class="form-control" th:field="*{descripcion}" placeholder="Describe brevemente tu situacion y necesidades" oninput="autoResize(this)" style="min-height: 80px;"></textarea>
            </div>

            <h3 class="section-title">Preferencias</h3>

            <div class="form-row">
                <div class="form-group">
                    <label for="preferenciaGenero" class="form-label">Genero preferido</label>
                    <select id="preferenciaGenero" class="form-control" th:field="*{preferenciaGenero}">
                        <option value="">Sin preferencia</option>
                        <option value="hombre">Hombre</option>
                        <option value="mujer">Mujer</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="idiomasRequeridos" class="form-label">Idiomas requeridos</label>
                    <input type="text" id="idiomasRequeridos" class="form-control" th:field="*{idiomasRequeridos}" placeholder="Ej: Valenciano">
                </div>
            </div>

            <div class="form-group">
                <label for="preferencias" class="form-label">Otras observaciones</label>
                <textarea id="preferencias" class="form-control" th:field="*{preferencias}" placeholder="Otras preferencias o comentarios" oninput="autoResize(this)" style="min-height: 80px;"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
                <a th:href="@{/usuarioOVI/homeUsuarioOVI}" class="btn btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
