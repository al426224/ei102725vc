<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/usuarioOVI/homeUsuarioOVI}" class="nav-item">Dashboard</a>
        <a th:href="@{/peticionAP/mis-solicitudes}" class="nav-item">Mis Solicitudes</a>
        <a th:href="@{/peticionAP/nueva}" class="nav-item">Nueva Solicitud</a>
        <a th:href="@{/usuarioOVI/perfil/{id}(id=${usuario.idUsuario})}" class="nav-item active">Mi Perfil</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <h1 class="page-title">Editar Perfil</h1>

    <div class="form-card">
        <form action="/usuarioOVI/update" method="POST" th:object="${usuario}">
            <input type="hidden" th:field="*{idUsuario}">

            <div class="form-group">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" th:field="*{nombre}" placeholder="Tu nombre">
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" id="email" class="form-control" th:field="*{email}" placeholder="tu@email.com">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="telefono" class="form-label">Teléfono</label>
                <input type="text" id="telefono" class="form-control" th:field="*{telefono}" placeholder="Tu teléfono">
                <div class="error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
            </div>

            <div class="form-group">
                <label for="proyectoVida" class="form-label">Proyecto de Vida</label>
                <textarea id="proyectoVida" class="form-control" th:field="*{proyectoVida}" placeholder="Describe tu proyecto de vida"></textarea>
                <div class="error" th:if="${#fields.hasErrors('proyectoVida')}" th:errors="*{proyectoVida}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Confirmar cambios</button>
                <a th:href="@{/usuarioOVI/perfil/{id}(id=${usuario.idUsuario})}" class="btn btn-outline">Cancelar</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
