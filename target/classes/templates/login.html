<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
    <title>Acceso - SgOVI</title>
</head>
<body>
<header class="header">
    <div class="nombre">
        <a th:href="@{/}" class="a">
            <span class="nav-logo-icon">OVI</span>
            <span class="nav-logo-text">SgOVI</span>
        </a>
    </div>
</header>

<div class="main-content">
    <div class="lado-izquierdo">
        <h1 class="titulo-pagina">Acceso al<br>Sistema</h1>
    </div>

    <div class="lado-derecho">
        <form th:action="@{/login}" method="POST" class="formulario" th:object="${userLogin}">
            <p th:if="${param.registered}" style="color: #2e7d32; margin-bottom: 10px;">Registro completado. Ya puedes iniciar sesión.</p>

            <div class="campos">
                <label for="username">Correo Electrónico</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="tu@email.com" maxlength="100">
                <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="campos">
                <label for="password">Contraseña</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="********" maxlength="255">
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="enviar">
                <button type="submit" class="boton btn btn-primary">Entrar</button>

                <div class="registro-link">
                    <p>¿No tienes cuenta?</p>
                    <a th:href="@{/signup}" class="boton-secundario">Registrarse</a>
                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
