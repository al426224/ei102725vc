<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Asistentes PAP/PATI - SgOVI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/tecnico/home}" class="nav-item">Gestionar UsuarioOVI</a>
        <a th:href="@{/tecnico/asistentes}" class="nav-item active">Gestionar Asistentes PAP/PATI</a>
        <a th:href="@{/tecnico/peticiones}" class="nav-item">Solicitudes de Asistencia</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <span class="profile-badge">TÉCNICO OVI</span>
        </div>
        <div class="tecnico-nombre">
            Técnico: <span th:text="${tecnico.nombre}">Técnico</span>
        </div>
    </header>

    <div th:if="${successMessage}" th:text="${successMessage}" class="alert alert-success"></div>
    <div th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert-danger"></div>

    <h1 class="page-title">Asistentes PAP/PATI</h1>

    <form th:action="@{/tecnico/asistentes}" method="get" class="filter-bar">
        <div class="filter-row">
            <div class="filter-group">
                <label for="estado">Estado:</label>
                <select id="estado" name="estado" class="form-control">
                    <option value="" th:selected="${estadoSeleccionado == '' or estadoSeleccionado == null}">Todos</option>
                    <option value="pendiente" th:selected="${estadoSeleccionado == 'pendiente'}">Pendiente</option>
                    <option value="validado" th:selected="${estadoSeleccionado == 'validado'}">Validado</option>
                    <option value="rechazado" th:selected="${estadoSeleccionado == 'rechazado'}">Rechazado</option>
                </select>
            </div>
            <button type="submit" class="btn btn-secondary">Filtrar</button>
        </div>
    </form>

    <div class="table-container">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th scope="col">Nombre</th>
                    <th scope="col">Email</th>
                    <th scope="col">Tipo</th>
                    <th scope="col">Municipio</th>
                    <th scope="col">Disponibilidad</th>
                    <th scope="col">Estado</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(asistentes)}">
                    <td colspan="7" class="empty-state">No hay asistentes con ese estado.</td>
                </tr>
                <tr th:each="a : ${asistentes}">
                    <td th:text="${a.nombre}"></td>
                    <td th:text="${a.email}"></td>
                    <td th:text="${a.tipoAsistente}"></td>
                    <td th:text="${a.municipio} ?: '-'"></td>
                    <td th:text="${a.disponibilidad}"></td>
                    <td>
                        <span class="status-badge" th:classappend="${a.estadoValidacion}" th:text="${a.estadoValidacion}"></span>
                    </td>
                    <td>
                        <a th:href="@{/tecnico/asistente/{id}(id=${a.idAsistente})}" class="link-detail">Ver detalles</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
