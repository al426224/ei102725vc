<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Asistentes PAP/PATI - SgOVI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body class="sidebar-layout">

<aside class="sidebar">
    <div class="brand">SgOVI Panel</div>

    <nav class="nav-menu">
        <a th:href="@{/tecnico/home}" class="nav-item">Gestionar UsuarioOVI</a>
        <a th:href="@{/tecnico/asistentes}" class="nav-item active">Gestionar Asistentes PAP/PATI</a>
    </nav>

    <a th:href="@{/logout}" class="logout-btn">Cerrar Sesión</a>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <span class="profile-badge">TÉCNICO OVI</span>
        </div>
        <div style="font-weight: 500;">
            Técnico: <span th:text="${tecnico.nombre}">Técnico</span>
        </div>
    </header>

    <p th:if="${successMessage}" th:text="${successMessage}" class="success-message"></p>
    <p th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></p>

    <h1 class="page-title">Asistentes PAP/PATI</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Tipo</th>
                    <th>Disponibilidad</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(asistentes)}">
                    <td colspan="6" class="empty-state">No hay asistentes registrados.</td>
                </tr>
                <tr th:each="a : ${asistentes}">
                    <td th:text="${a.nombre}"></td>
                    <td th:text="${a.email}"></td>
                    <td th:text="${a.tipoAsistente}"></td>
                    <td th:text="${a.disponibilidad}"></td>
                    <td>
                        <span th:class="${'estado-' + #strings.replace(a.estadoValidacion, ' ', '-')}" th:text="${a.estadoValidacion}"></span>
                    </td>
                    <td>
                        <a th:href="@{/tecnico/asistente/{id}(id=${a.idAsistente})}" class="link-detail">Ver detalle</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
