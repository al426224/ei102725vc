<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SgOVI - Oficina per la Vida Independent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container-fluid px-4">
        <a th:href="@{/}" class="nav-link d-flex align-items-center gap-2 text-decoration-none">
            <div class="nav-logo-icon">OVI</div>
            <span class="nav-logo-text">SgOVI Castelló</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item"><a class="nav-link" href="#servicios">Servicios</a></li>
                <li class="nav-item ms-lg-3" th:if="${session.usuario == null}">
                    <a th:href="@{/login}" class="nav-acceder">Acceder</a>
                </li>
                <li class="nav-item ms-lg-3" th:unless="${session.usuario == null}">
                    <span class="usuario-logado" th:text="${session.usuario.nombre}">Usuario</span>
                    <a th:href="@{/logout}" class="nav-acceder">Salir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="hero" id="inicio">
    <div class="slide-content">
        <h1>Vida autónoma e independiente</h1>
        <p class="slide-desc">Gestión integral de asistencia personal para personas con diversidad funcional en Castelló.</p>
        <a th:href="@{/login}" class="slide-cta" th:if="${session.usuario == null}">Empezar ahora</a>
    </div>
</section>

<section class="acceso-section" id="servicios" th:if="${session.usuario == null}">
    <h2 class="section-title">¿Cómo quieres participar?</h2>
    <div class="row justify-content-center g-4">
        <div class="col-md-4 col-lg-3">
            <a th:href="@{/signup/registerUsuarioOVI}" class="acceso-card">
                <div class="acceso-icon verde">🙋</div>
                <span class="acceso-nombre">Usuario OVI</span>
            </a>
        </div>
        <div class="col-md-4 col-lg-3">
            <a th:href="@{/signup/registerAsistentePersonal}" class="acceso-card">
                <div class="acceso-icon azul">🤲</div>
                <span class="acceso-nombre">Asistente PAP</span>
            </a>
        </div>
    </div>
</section>

</body>
</html>
