<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Usuario OVI</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        h1 { color: #333; }
        h2 { color: #555; margin-top: 30px; }
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 150px; }
        input, select { padding: 5px; width: 200px; }
        button { background: #007bff; color: white; padding: 8px 15px; border: none; cursor: pointer; margin-right: 5px; }
        button:hover { background: #0056b3; }
        .result { background: #f8f9fa; padding: 15px; margin-top: 20px; border: 1px solid #ddd; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #007bff; color: white; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Gestión Usuario OVI</h1>

    <!-- BUSCAR POR ID -->
    <h2>Buscar por ID</h2>
    <form action="/usuario/buscarId" method="post">
        <div class="form-group">
            <label>ID:</label>
            <input type="text" name="idUsuario" required />
            <button type="submit">Buscar</button>
        </div>
    </form>

    <!-- BUSCAR POR EMAIL -->
    <h2>Buscar por Email</h2>
    <form action="/usuario/buscarEmail" method="post">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required />
            <button type="submit">Buscar</button>
        </div>
    </form>

    <!-- BUSCAR POR DNI -->
    <h2>Buscar por DNI</h2>
    <form action="/usuario/buscarDni" method="post">
        <div class="form-group">
            <label>DNI:</label>
            <input type="text" name="dni" required />
            <button type="submit">Buscar</button>
        </div>
    </form>

    <!-- LISTAR TODOS -->
    <h2>Listar Todos</h2>
    <form action="/usuario/listar" method="post">
        <button type="submit">Listar Todos</button>
    </form>

    <!-- BUSCAR POR ESTADO -->
    <h2>Buscar por Estado</h2>
    <form action="/usuario/buscarEstado" method="post">
        <div class="form-group">
            <label>Estado:</label>
            <select name="estado">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
                <option value="pendiente">Pendiente</option>
            </select>
            <button type="submit">Buscar</button>
        </div>
    </form>

    <!-- CREAR USUARIO -->
    <h2>Crear Usuario</h2>
    <form action="/usuario/crear" method="post">
        <div class="form-group"><label>Nombre:</label><input type="text" name="nombre" required /></div>
        <div class="form-group"><label>Email:</label><input type="email" name="email" required /></div>
        <div class="form-group"><label>Teléfono:</label><input type="text" name="telefono" /></div>
        <div class="form-group"><label>DNI:</label><input type="text" name="dni" /></div>
        <div class="form-group"><label>Proyecto Vida:</label><input type="text" name="proyectoVida" /></div>
        <div class="form-group"><label>Estado:</label>
            <select name="estado">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
                <option value="pendiente">Pendiente</option>
            </select>
        </div>
        <button type="submit">Crear</button>
    </form>

    <!-- ACTUALIZAR USUARIO -->
    <h2>Actualizar Usuario</h2>
    <form action="/usuario/actualizar" method="post">
        <div class="form-group"><label>ID:</label><input type="text" name="idUsuario" required /></div>
        <div class="form-group"><label>Nombre:</label><input type="text" name="nombre" /></div>
        <div class="form-group"><label>Email:</label><input type="email" name="email" /></div>
        <div class="form-group"><label>Teléfono:</label><input type="text" name="telefono" /></div>
        <div class="form-group"><label>Estado:</label>
            <select name="estado">
                <option value="">Sin cambiar</option>
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
                <option value="pendiente">Pendiente</option>
            </select>
        </div>
        <button type="submit">Actualizar</button>
    </form>

    <!-- ELIMINAR USUARIO -->
    <h2>Eliminar Usuario</h2>
    <form action="/usuario/eliminar" method="post">
        <div class="form-group">
            <label>ID:</label>
            <input type="text" name="idUsuario" required />
            <button type="submit" style="background: #dc3545;">Eliminar</button>
        </div>
    </form>

    <!-- RESULTADO -->
    <div class="result" th:if="${resultado}">
        <strong>Resultado:</strong>
        <div th:if="${resultado == 'empty'}">No se encontraron resultados.</div>
        <div th:unless="${resultado == 'empty'}" th:text="${resultado}"></div>
    </div>

    <div class="result" th:if="${mensaje}" style="background: #d4edda;">
        <strong th:text="${mensaje}"></strong>
    </div>

    <div class="result" th:if="${usuarios}">
        <strong>Usuarios:</strong>
        <table>
            <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>DNI</th><th>Estado</th></tr>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.idUsuario}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.telefono}"></td>
                <td th:text="${u.dni}"></td>
                <td th:text="${u.estado}"></td>
            </tr>
        </table>
    </div>
</body>
</html>
