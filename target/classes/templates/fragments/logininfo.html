<div class="loggeduser" th:object="${session}" th:fragment="logininfo">
    <p th:if="*{usuario == null}">
        No autenticado <a href="/login" th:href="@{/login}">Entrar</a>
    </p>
    <p th:unless="*{usuario == null}">
        Autenticado como <span th:text="*{usuario.nombre}"></span>
        <a href="/logout" th:href="@{/logout}">Salir</a>
    </p>
</div>
