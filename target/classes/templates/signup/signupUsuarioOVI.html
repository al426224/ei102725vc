<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Uso de th:href para asegurar que la ruta al CSS siempre funcione -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <title>Registro Usuario OVI - SgOVI</title>
</head>
<body>
<header>
    <div class="logo">
        <img th:src="@{/images/logo.png}" alt="Logo">
    </div>
</header>

<div class="main-content">
    <!-- Lado izquierdo - Título -->
    <div class="lado-izquierdo">
        <h1 class="titulo-pagina">Registro<br>Usuario OVI</h1>
    </div>

    <!-- Lado derecho - Formulario -->
    <div class="lado-derecho">
        <form th:action="@{/signup/registerUsuarioOVI}" method="POST" class="formulario" th:object="${usuarioOVI}">

            <p class="campos-obligatorios">* Campos obligatorios</p>

            <!-- Grupo: Nombre -->
            <div class="campos">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Tu nombre completo">
                <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <!-- Grupo: Email y Teléfono en una fila para ahorrar espacio -->
            <div class="campos-fila">
                <div class="campos">
                    <label for="email">Email *</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="tu@email.com">
                    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="campos">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" th:field="*{telefono}" placeholder="600 000 000">
                </div>
            </div>

            <!-- Grupo: DNI y Fecha Nacimiento -->
            <div class="campos-fila">
                <div class="campos">
                    <label for="dni">DNI *</label>
                    <input type="text" id="dni" th:field="*{dni}" placeholder="12345678A">
                    <div class="error" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                </div>
                <div class="campos">
                    <label for="fechaNacimiento">Fecha de Nacimiento *</label>
                    <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}">
                    <div class="error" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></div>
                </div>
            </div>

            <!-- Campo: Contraseña -->
            <div class="campos">
                <label for="contrasena">Contraseña *</label>
                <input type="password" id="contrasena" name="contrasena" th:value="${rawPassword}" placeholder="Mínimo 8 caracteres">
                <div class="error" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}"></div>
            </div>

            <!-- Campo: Proyecto de Vida -->
            <div class="campos">
                <label for="proyectoVida">Proyecto de Vida</label>
                <textarea id="proyectoVida" th:field="*{proyectoVida}" rows="3" placeholder="Describe brevemente tus objetivos de vida independiente..."></textarea>
            </div>

            <!-- Checkbox LOPD -->
            <div class="campos campos-checkbox">
                <input type="checkbox" id="consentimientoLOPD" th:field="*{consentimientoLOPD}">
                <label for="consentimientoLOPD">Acepto el tratamiento de datos personales y el registro del consentimiento (LOPD/RGPD).</label>
            </div>
            <div class="error" th:if="${#fields.hasErrors('consentimientoLOPD')}" th:errors="*{consentimientoLOPD}"></div>

            <!-- Botones -->
            <div class="enviar">
                <button type="submit" class="boton">Finalizar Registro</button>
                <a th:href="@{/signup}" class="boton-secundario">Volver atrás</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
