<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/usuario.css}">
    <title>Registro - SgOVI</title>
</head>
<body>
<header class="header">
    <div class="nombre">
        <a th:href="@{/}" class="a">
            <span class="nav-logo-icon">OVI</span>
            <span class="nav-logo-text">SgOVI</span>
        </a>
    </div>
</header>

<div class="main-content">

    <div class="lado-izquierdo">
        <h1 class="titulo-pagina">Crea tu<br>cuenta</h1>
    </div>

    <div class="lado-derecho">
        <div class="formulario">
            <p style="font-size: 18px; margin-bottom: 30px; line-height: 1.5; font-weight: bold; text-align: center;">
                ¿Cómo vas a participar en la OVI?
            </p>

            <div class="enviar">
                <a th:href="@{/signup/registerUsuarioOVI}" class="btn btn-primary" style="display: block; margin-bottom: 0.5rem;">Registrarme como Usuario OVI</a>

                <a th:href="@{/signup/registerAsistentePersonal}" class="btn btn-primary">Registrarme como PAP / PATI</a>

                

                <div style="margin-top: 30px;">
                    <a th:href="@{/}" class="back-link">Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
